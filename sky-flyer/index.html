<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a1030; font-family: system-ui, sans-serif;
    touch-action: none; -webkit-user-select: none; user-select: none; }
  canvas { display: block; }
  #overlay {
    position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; padding: 20px;
    background: rgba(6, 12, 32, .75); color: #fff; text-align: center; backdrop-filter: blur(5px);
  }
  #overlay h1 { margin: 0; font-size: 2.6rem; letter-spacing: 2px; font-weight: 800; }
  #overlay .sub { opacity: .8; font-size: 1.02rem; max-width: 480px; line-height: 1.5; }
  #overlay .start { margin-top: 8px; background: #ffd166; color: #1d2430; font-weight: 700;
    padding: 13px 34px; border-radius: 999px; font-size: 1.15rem; cursor: pointer; border: none; font-family: inherit; }
  #overlay .mp { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #overlay .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  #overlay .mbtn {
    border: 1px solid rgba(255,255,255,.25); cursor: pointer; color: #fff; font-family: inherit;
    background: rgba(255,255,255,.08); padding: 11px 20px; border-radius: 999px; font-size: .95rem;
  }
  #overlay .mbtn:hover { background: rgba(255,255,255,.18); }
  #overlay input {
    text-align: center; font-family: inherit; font-size: 1rem; font-weight: 700;
    letter-spacing: 1px; color: #fff; background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.25); border-radius: 10px; padding: 10px 8px; outline: none;
  }
  #nameInput { width: 15ch; }
  #joinCode { width: 6ch; text-transform: uppercase; letter-spacing: 2px; }
  #mpStatus { min-height: 1.3em; font-size: .92rem; color: #ffd166; max-width: 480px; line-height: 1.6; }
  #mpStatus a { color: #ffd166; word-break: break-all; }
  #mpStatus button { border: none; cursor: pointer; font-family: inherit; font-size: .85rem; font-weight: 700;
    background: #ffd166; color: #1d2430; padding: 6px 14px; border-radius: 999px; margin: 2px 4px; }
  #hint {
    position: fixed; left: calc(14px + env(safe-area-inset-left)); bottom: calc(14px + env(safe-area-inset-bottom));
    z-index: 5; color: #fff; pointer-events: none;
    background: rgba(8, 14, 34, .45); padding: 8px 14px; border-radius: 10px;

  }
  #stats {
    position: fixed; right: calc(14px + env(safe-area-inset-right)); top: calc(14px + env(safe-area-inset-top));
    z-index: 5; color: #fff; pointer-events: none;
    background: rgba(8, 14, 34, .45); padding: 6px 12px; border-radius: 10px;
    font-size: .8rem; text-align: right; line-height: 1.5;
  }
  #scenes {
    position: fixed; right: calc(14px + env(safe-area-inset-right)); bottom: calc(14px + env(safe-area-inset-bottom));
    z-index: 6; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; max-width: 70vw;
  }
  #scenes button {
    border: none; cursor: pointer; color: #fff; font-size: .85rem; font-family: inherit;
    background: rgba(8, 14, 34, .5); padding: 8px 13px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,.15); transition: background .3s;
  }
  #scenes button.active { background: rgba(255, 209, 102, .85); color: #1d2430; font-weight: 700; }
  #soundBtn {
    position: fixed; left: calc(14px + env(safe-area-inset-left)); top: calc(14px + env(safe-area-inset-top));
    z-index: 6; display: none; border: 1px solid rgba(255,255,255,.15); cursor: pointer;
    background: rgba(8, 14, 34, .5); color: #fff; font-size: 1.1rem; padding: 8px 12px; border-radius: 999px;
  }
  #buddies { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

    position: absolute; left: 0; top: 0; display: flex; align-items: center; gap: 6px;
    font-size: .8rem; font-weight: 700; white-space: nowrap;

  }

    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 52%, rgba(4,8,22,.42) 100%); }

    position: fixed; width: 116px; height: 116px; border-radius: 50%; display: none; z-index: 7;
    border: 2px solid rgba(255,255,255,.28); background: rgba(255,255,255,.05);
    transform: translate(-50%,-50%); pointer-events: none;
  }
  #joyKnob {
    position: absolute; left: 50%; top: 50%; width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,.4); transform: translate(-50%,-50%);

    position: fixed; right: calc(20px + env(safe-area-inset-right)); bottom: calc(96px + env(safe-area-inset-bottom));

  }

  @media (pointer: coarse) {
    #hint { left: 50%; bottom: auto; top: calc(14px + env(safe-area-inset-top)); transform: translateX(-50%); text-align: center; }
    #scenes { right: auto; left: calc(14px + env(safe-area-inset-left)); justify-content: flex-start; max-width: 55vw; }

<body>

<script type="module">
import * as THREE from 'three';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

const isTouch = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;

// ---------------- Scenes (moods) ----------------
const SCENES = [
  { name: '🌙 Moonlit Night', top: 0x233670, bottom: 0x0c1338, fog: 0x182050, fogNear: 170, fogFar: 1050,
    ground: 0x3d4f86, cloud: 0x4a5a94, cloudOp: .8, stars: .9, orb: 1, orbCol: 0xf8f4d8, orbPos: [260, 340, -700], orbScale: 1.12,
    hemi: .62, hemiCol: 0x9db0e8, dir: .95, dirCol: 0xd6e0ff, city: 0, aurora: 1, moonTex: 1 },
  { name: '🌃 City Lights', top: 0x191632, bottom: 0x0b0a18, fog: 0x100e22, fogNear: 120, fogFar: 800,
    ground: 0x07070f, cloud: 0x262038, cloudOp: .55, stars: .5, orb: .6, orbCol: 0xe8e4c8, orbPos: [-380, 380, -600], orbScale: .55,
    hemi: .4, hemiCol: 0x7a74b8, dir: .35, dirCol: 0xaab, city: 1, moonTex: .55, locked: 1 },
  { name: '🌅 Golden Sunset', top: 0xff9e5e, bottom: 0xffc98a, fog: 0xffb98a, fogNear: 130, fogFar: 850,
    ground: 0xc96f4a, cloud: 0xffd9c4, cloudOp: .9, stars: 0, orb: 1, orbCol: 0xffe0b0, orbPos: [0, 90, -900], orbScale: 1.5,
    hemi: .75, hemiCol: 0xffcf9e, dir: .8, dirCol: 0xffb37a, city: 0, locked: 1 },
  { name: '☁️ Blue Day', top: 0x6fb9e8, bottom: 0xcfeaf7, fog: 0xd4ecf8, fogNear: 180, fogFar: 1100,
    ground: 0x5b9e6e, cloud: 0xffffff, cloudOp: .95, stars: 0, orb: .9, orbCol: 0xfff6d8, orbPos: [320, 420, -450], orbScale: .8,
    hemi: 1, hemiCol: 0xeaf6ff, dir: 1.1, dirCol: 0xfff2d8, city: 0, locked: 1 },
  { name: '🌊 Ocean Isles', top: 0x4fa8e0, bottom: 0xc2e8f7, fog: 0xcfeaf5, fogNear: 170, fogFar: 1000,
    ground: 0xc9b98a, cloud: 0xffffff, cloudOp: .9, stars: 0, orb: 1, orbCol: 0xfff2cc, orbPos: [300, 380, -520], orbScale: .9,
    hemi: .95, hemiCol: 0xeaf8ff, dir: 1.15, dirCol: 0xfff4da, city: 0, ocean: 1, locked: 1 }
];
let target = SCENES[0];

// live-lerped params
const cur = {
  top: new THREE.Color(target.top), bottom: new THREE.Color(target.bottom), fog: new THREE.Color(target.fog),
  ground: new THREE.Color(target.ground), cloud: new THREE.Color(target.cloud), orbCol: new THREE.Color(target.orbCol),
  hemiCol: new THREE.Color(target.hemiCol), dirCol: new THREE.Color(target.dirCol),
  fogNear: target.fogNear, fogFar: target.fogFar, cloudOp: target.cloudOp, stars: target.stars,
  orb: target.orb, orbScale: target.orbScale, hemi: target.hemi, dir: target.dir,
  aurora: target.aurora || 0, moonTex: target.moonTex || 0,
  orbPos: new THREE.Vector3(...target.orbPos)
};

// ---------------- Renderer / scene ----------------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(cur.fog.clone(), cur.fogNear, cur.fogFar);
const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 3000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, isTouch ? 1.6 : 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.style.touchAction = 'none';
document.body.appendChild(renderer.domElement);

const hemiLight = new THREE.HemisphereLight(cur.hemiCol, 0x3a3a4a, cur.hemi);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(cur.dirCol, cur.dir);
dirLight.position.set(150, 300, -200);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(isTouch ? 512 : 1024, isTouch ? 512 : 1024);
Object.assign(dirLight.shadow.camera, { left: -160, right: 160, top: 160, bottom: -160, near: 1, far: 800 });
scene.add(dirLight, dirLight.target);

// ---------------- Sky dome (with sun/moon glow + horizon haze) ----------------
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor: { value: cur.top.clone() }, bottomColor: { value: cur.bottom.clone() },
    sunDir: { value: new THREE.Vector3(0, 1, 0) }, sunColor: { value: cur.orbCol.clone() },
    sunAmt: { value: 1 }
  },
  vertexShader: `varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor;
    uniform vec3 sunDir; uniform vec3 sunColor; uniform float sunAmt;
    varying vec3 vDir;
    void main() {
      vec3 d = normalize(vDir);
      float h = clamp(d.y * 1.6 + 0.25, 0.0, 1.0);
      vec3 col = mix(bottomColor, topColor, pow(h, 0.8));
      float s = max(dot(d, sunDir), 0.0);
      col += sunColor * pow(s, 26.0) * 0.6 * sunAmt;   // bright halo hugging the orb
      col += sunColor * pow(s, 4.0) * 0.14 * sunAmt;   // wide atmospheric wash
      col += bottomColor * pow(1.0 - abs(d.y), 6.0) * 0.28;  // horizon haze band
      gl_FragColor = vec4(col, 1.0);
    }`,
  side: THREE.BackSide, depthWrite: false, fog: false
});
const sky = new THREE.Mesh(new THREE.SphereGeometry(1400, 24, 16), skyMat);
scene.add(sky);

// ---------------- Stars (two layers: dust + bright twinklers) ----------------
function starField(count, size) {
  const pos = [];
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2, p = Math.acos(Math.random() * 0.95);
    const r = 1150;
    pos.push(r * Math.sin(p) * Math.cos(t), r * Math.cos(p), r * Math.sin(p) * Math.sin(t));
  }
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size, sizeAttenuation: false,
    transparent: true, opacity: cur.stars, fog: false, depthWrite: false });
  const pts = new THREE.Points(
    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(pos, 3)), mat);
  scene.add(pts);
  return { pts, mat };
}
const starsA = starField(850, 1.7);
const starsB = starField(130, 3.1);   // the bright ones twinkle out of phase

// ---------------- Milky Way band ----------------
function milkyTexture() {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 256;
  const ctx = c.getContext('2d');
  for (let i = 0; i < 280; i++) {
    const x = Math.random() * 1024;
    const y = 128 + (Math.random() + Math.random() + Math.random() - 1.5) * 55;
    const r = 14 + Math.random() * 46;
    const g = ctx.createRadialGradient(x, y, 1, x, y, r);
    const a = 0.02 + Math.random() * 0.035;
    g.addColorStop(0, Math.random() < .3 ? `rgba(255,235,210,${a})` : `rgba(190,205,255,${a})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 1024, 256);
  }
  for (let i = 0; i < 420; i++) {   // pinprick stars thicken along the band
    ctx.globalAlpha = 0.15 + Math.random() * 0.5;
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    ctx.fillRect(Math.random() * 1024, 128 + (Math.random() + Math.random() - 1) * 70, 1.2, 1.2);
  }
  ctx.globalAlpha = 1;
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}
const milkyMat = new THREE.MeshBasicMaterial({ map: milkyTexture(), transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, side: THREE.BackSide, fog: false, depthWrite: false });
const milky = new THREE.Mesh(new THREE.CylinderGeometry(1120, 1120, 760, 48, 1, true), milkyMat);
milky.rotation.z = 0.6; milky.rotation.y = 1.7;
scene.add(milky);

// ---------------- Aurora ribbons (moonlit night) ----------------
const auroraGroup = new THREE.Group();
scene.add(auroraGroup);
const auroraRibbons = [];
{
  const vert = `uniform float time; uniform float phase; varying vec2 vUv;
    void main() {
      vUv = uv;
      vec3 p = position;
      p.z += sin(uv.x * 7.0 + time * 0.25 + phase) * 60.0 + sin(uv.x * 19.0 + time * 0.6 + phase * 2.0) * 18.0;
      p.y += sin(uv.x * 4.0 + time * 0.18 + phase) * 30.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }`;
  const frag = `uniform float time; uniform float phase; uniform float amp; varying vec2 vUv;
    void main() {
      float curtain = 0.55 + 0.45 * sin(vUv.x * 26.0 + time * 0.5 + phase * 3.0)
                             * sin(vUv.x * 11.0 - time * 0.23 + phase);
      float a = pow(1.0 - vUv.y, 2.0) * smoothstep(0.0, 0.06, vUv.y)
              * smoothstep(0.0, 0.09, vUv.x) * smoothstep(1.0, 0.91, vUv.x)
              * (0.3 + 0.7 * curtain) * amp;
      vec3 col = mix(vec3(0.28, 1.0, 0.62), vec3(0.62, 0.42, 1.0),
                     clamp(vUv.y * 1.15 + 0.12 * sin(vUv.x * 5.0 + time * 0.2), 0.0, 1.0));
      gl_FragColor = vec4(col * a, a);
    }`;
  [[0, 470, -780, 0.15, 0], [-420, 520, -560, 0.9, 2.1], [430, 430, -640, -0.7, 4.4]].forEach(([x, y, z, ry, ph]) => {
    const mat = new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 }, phase: { value: ph }, amp: { value: 0 } },
      vertexShader: vert, fragmentShader: frag,
      transparent: true, depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
    });
    const m = new THREE.Mesh(new THREE.PlaneGeometry(1500, 300, 96, 6), mat);
    m.position.set(x, y, z);
    m.rotation.y = ry;
    m.frustumCulled = false;
    auroraRibbons.push(m);
    auroraGroup.add(m);
  });
}

// ---------------- Moon / Sun orb with glow ----------------
function radialTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 4, 64, 64, 64);
  g.addColorStop(0, 'rgba(255,255,255,.9)'); g.addColorStop(0.35, 'rgba(255,255,255,.28)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const orbGroup = new THREE.Group();
const orbMat = new THREE.MeshBasicMaterial({ color: cur.orbCol, fog: false, transparent: true, opacity: cur.orb });
const orb = new THREE.Mesh(new THREE.SphereGeometry(42, 24, 16), orbMat);
const glowMat = new THREE.SpriteMaterial({ map: radialTexture(), color: cur.orbCol, fog: false,
  transparent: true, opacity: cur.orb * .8, depthWrite: false });
const glow = new THREE.Sprite(glowMat);
glow.scale.set(340, 340, 1);

// craters + maria drawn once onto a slightly larger shell — fades in for night skies
function moonTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const blob = (x, y, r, a) => {
    const g = ctx.createRadialGradient(x, y, r * .2, x, y, r);
    g.addColorStop(0, `rgba(88,96,124,${a})`); g.addColorStop(1, 'rgba(88,96,124,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, 6.29); ctx.fill();
  };
  blob(150, 92, 55, .5); blob(92, 122, 40, .42); blob(172, 168, 34, .36); blob(112, 190, 22, .3);
  for (let i = 0; i < 30; i++) blob(Math.random() * 256, Math.random() * 256, 3 + Math.random() * 11, .18 + Math.random() * .2);
  return new THREE.CanvasTexture(c);
}
const moonFaceMat = new THREE.MeshBasicMaterial({ map: moonTexture(), transparent: true,
  opacity: 0, fog: false, depthWrite: false });
const moonFace = new THREE.Mesh(new THREE.SphereGeometry(42.4, 24, 16), moonFaceMat);
function haloTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  g.addColorStop(0.62, 'rgba(225,235,255,0)');
  g.addColorStop(0.74, 'rgba(225,235,255,.14)');
  g.addColorStop(0.86, 'rgba(225,235,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(c);
}
const haloMat = new THREE.SpriteMaterial({ map: haloTexture(), fog: false,
  transparent: true, opacity: 0, depthWrite: false });
const halo = new THREE.Sprite(haloMat);
halo.scale.set(560, 560, 1);
orbGroup.add(orb, moonFace, glow, halo);
scene.add(orbGroup);

// ---------------- Ground (rolling hills) ----------------
const groundMat = new THREE.MeshLambertMaterial({ color: cur.ground, vertexColors: true });
const G_SIZE = 2600, G_SEG = 100, G_STEP = G_SIZE / G_SEG;
const groundGeo = new THREE.PlaneGeometry(G_SIZE, G_SIZE, G_SEG, G_SEG);
groundGeo.rotateX(-Math.PI / 2);
groundGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(groundGeo.attributes.position.count * 3), 3));
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.receiveShadow = true;
scene.add(ground);

function nHash(x, z) { const s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453; return s - Math.floor(s); }
function nSmooth(x, z) {
  const xi = Math.floor(x), zi = Math.floor(z), xf = x - xi, zf = z - zi;
  const u = xf * xf * (3 - 2 * xf), v = zf * zf * (3 - 2 * zf);
  const a = nHash(xi, zi), b = nHash(xi + 1, zi), c = nHash(xi, zi + 1), d = nHash(xi + 1, zi + 1);
  return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
}
let hillScale = 1;   // hills flatten in the city scene so towers sit on level ground

// countryside patchwork — every field its own moonlit shade, hedgerows between
const FIELD = 150;
const FIELD_PALS = [
  [.82, .98, .9], [1.0, 1.06, .96], [.88, .94, 1.12], [1.12, 1.02, .84],
  [.78, .9, 1.06], [1.04, 1.12, 1.0], [.94, 1.0, .88], [1.08, .96, 1.08]
];
function fieldTint(x, z, out) {
  const fx = Math.floor(x / FIELD), fz = Math.floor(z / FIELD);
  const r = mulberry32(fx * 73856093 ^ fz * 19349663 ^ 0x99)();
  const p = FIELD_PALS[Math.floor(r * FIELD_PALS.length)];
  const ex = Math.abs(x / FIELD - Math.round(x / FIELD));
  const ez = Math.abs(z / FIELD - Math.round(z / FIELD));
  const edge = Math.min(ex, ez) < 0.04 ? 0.68 : 1;   // hedgerow shadow lines
  out[0] = p[0] * edge; out[1] = p[1] * edge; out[2] = p[2] * edge;
}
const ftTmp = [1, 1, 1];
let gCX = Infinity, gCZ = Infinity, gHS = -1;
function updateGround(px, pz) {
  hillScale = Math.max(0, 1 - cur.city - cur.ocean);
  const cx = Math.round(px / G_STEP) * G_STEP, cz = Math.round(pz / G_STEP) * G_STEP;
  if (cx === gCX && cz === gCZ && Math.abs(hillScale - gHS) < 0.02) return;
  gCX = cx; gCZ = cz; gHS = hillScale;
  ground.position.set(cx, 0, cz);
  const pos = groundGeo.attributes.position, col = groundGeo.attributes.color;
  for (let i = 0; i < pos.count; i++) {
    const wx = pos.getX(i) + cx, wz = pos.getZ(i) + cz;
    const h = terrainH(wx, wz);
    pos.setY(i, h);
    const tint = 0.8 + (h / 26 + 0.55) * 0.35;   // valleys darker, hilltops brighter
    fieldTint(wx, wz, ftTmp);
    col.setXYZ(i, tint * ftTmp[0], tint * ftTmp[1], tint * ftTmp[2]);
  }
  pos.needsUpdate = true; col.needsUpdate = true;
  groundGeo.computeVertexNormals();
  updateTrees(cx, cz);
  updateVillages(cx, cz);

}

function updateBirds(dt, t, px, pz) {
  const show = cur.stars < 0.25;
  for (const flock of flocks) {
    flock.visible = show;
    if (!show) continue;
    const u = flock.userData;
    u.yaw += u.turn * dt;
    flock.rotation.y = u.yaw;
    flock.position.x -= Math.sin(u.yaw) * u.speed * dt;
    flock.position.z -= Math.cos(u.yaw) * u.speed * dt;
    flock.position.y += Math.sin(t * 0.4 + u.members[0].userData.phase) * dt * 0.8;
    if (Math.hypot(flock.position.x - px, flock.position.z - pz) > 750) {
      const a = Math.random() * Math.PI * 2;
      const r = 300 + Math.random() * 300;
      flock.position.set(px - Math.sin(a) * r, 55 + Math.random() * 100, pz - Math.cos(a) * r);
      u.yaw = Math.random() * Math.PI * 2;
    }
    for (const bird of u.members) {
      const flap = Math.sin(t * 7 + bird.userData.phase) * 0.55;
      bird.userData.wl.rotation.y = flap;
      bird.userData.wr.rotation.y = -flap;
      bird.position.y += Math.sin(t * 2 + bird.userData.phase) * dt * 0.4;
    }
  }
}

const cityChunks = new Map();
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makeChunk(cx, cz) {
  const rnd = mulberry32(cx * 73856093 ^ cz * 19349663);
  const perMat = [[], [], []];
  const count = 9 + Math.floor(rnd() * 6);
  for (let i = 0; i < count; i++) {
    const w = 14 + rnd() * 18, d = 14 + rnd() * 18;
    const h = 18 + Math.pow(rnd(), 2) * 95;
    const g = new THREE.BoxGeometry(w, h, d).toNonIndexed();
    const uv = g.getAttribute('uv');
    for (let k = 0; k < uv.count; k++) uv.setXY(k, uv.getX(k) * w / 16, uv.getY(k) * h / 24);
    g.translate(cx * CHUNK + (rnd() - .5) * (CHUNK - 40), h / 2, cz * CHUNK + (rnd() - .5) * (CHUNK - 40));
    perMat[Math.floor(rnd() * 3)].push(g);
  }
  const group = new THREE.Group();
  perMat.forEach((list, i) => {
    if (list.length) group.add(new THREE.Mesh(BufferGeometryUtils.mergeGeometries(list), towerMats[i]));
  });

}
function updateCity(px, pz) {
  if (cur.city < 0.03) return;
  const ccx = Math.round(px / CHUNK), ccz = Math.round(pz / CHUNK);
  const r = Math.ceil(CITY_R / CHUNK);
  for (let dz = -r; dz <= r; dz++) for (let dx = -r; dx <= r; dx++) {
    const cx = ccx + dx, cz = ccz + dz, key = cx + '_' + cz;
    if (!cityChunks.has(key)) {
      const g = makeChunk(cx, cz);
      cityChunks.set(key, g);
      cityGroup.add(g);
    }
  }
  for (const [key, g] of cityChunks) {
    const [cx, cz] = key.split('_').map(Number);
    if (Math.hypot(cx * CHUNK - px, cz * CHUNK - pz) > CITY_R + CHUNK * 2) {
      cityGroup.remove(g);
      g.traverse(o => o.geometry && o.geometry.dispose());
      cityChunks.delete(key);
    }
  }
}

function makeTrail(color, N = 60) {
  const geo = new THREE.BufferGeometry();
  const posArr = new Float32Array(N * 2 * 3);
  const colArr = new Float32Array(N * 2 * 4);
  for (let i = 0; i < N; i++) {
    const a = Math.pow(1 - i / (N - 1), 1.6) * 0.22;   // fades toward the tail
    colArr.set([1, 1, 1, a], (i * 2) * 4);
    colArr.set([1, 1, 1, a], (i * 2 + 1) * 4);
  }
  const idx = [];
  for (let i = 0; i < N - 1; i++) {
    const a = i * 2;
    idx.push(a, a + 1, a + 2, a + 1, a + 3, a + 2);
  }
  geo.setIndex(idx);
  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colArr, 4));
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, vertexColors: true,
    transparent: true, depthWrite: false, side: THREE.DoubleSide }));
  mesh.frustumCulled = false;
  scene.add(mesh);
  return { mesh, geo, N, pts: Array.from({ length: N }, () => new THREE.Vector3()), primed: false };
}

  tr.pts[0].copy(p);

    pos.setXYZ(i * 2, tr.pts[i].x, tr.pts[i].y - w, tr.pts[i].z);

      const dy = Math.max(-1, Math.min(1, (t.clientY - joyBaseY) / JOY_R));

    const droneLP = AC.createBiquadFilter();
    droneLP.type = 'lowpass'; droneLP.frequency.value = 220;
    droneLP.connect(droneGain); droneGain.connect(master);
    [[55, -5, 'sine', 1], [55, 5, 'sine', .8], [110, 0, 'triangle', .25]].forEach(([f, det, type, gv]) => {
      const o = AC.createOscillator();
      o.type = type; o.frequency.value = f; o.detune.value = det;
      const og = AC.createGain(); og.gain.value = gv;
      o.connect(og); og.connect(droneLP); o.start();
    });
    const droneLfo = AC.createOscillator(), droneLfoG = AC.createGain();
    droneLfo.frequency.value = 0.06; droneLfoG.gain.value = 0.015;
    droneLfo.connect(droneLfoG); droneLfoG.connect(droneGain.gain); droneLfo.start();

    // --- felt-piano pluck for the night motif, echoing into the ping-pong bus ---
    function pluck(m, when, vel, pan) {
      const o = AC.createOscillator();
      o.type = 'triangle'; o.frequency.value = mtof(m);
      const lp = AC.createBiquadFilter();
      lp.type = 'lowpass'; lp.Q.value = 0.6;
      lp.frequency.setValueAtTime(1500, when);
      lp.frequency.exponentialRampToValueAtTime(320, when + 2.4);
      const g = AC.createGain();
      g.gain.setValueAtTime(0.0001, when);
      g.gain.linearRampToValueAtTime(vel, when + 0.025);
      g.gain.exponentialRampToValueAtTime(0.0001, when + 3.2);
      const p = makePan(pan);
      o.connect(lp); lp.connect(g); g.connect(p); p.connect(master);
      g.connect(chimeSend);
      o.start(when); o.stop(when + 3.4);
    }

    // gameplay one-shots: a bright catch-chime, and a rising release arpeggio
    lanternChime = () => {
      const m = [76, 81, 84][Math.floor(Math.random() * 3)];
      pluck(m, AC.currentTime + 0.01, 0.065, (Math.random() - .5) * 0.8);
    };
    releaseChord = () => {
      [57, 64, 69, 72, 76, 81].forEach((m, i) =>
        pluck(m, AC.currentTime + 0.05 + i * 0.13, 0.055, i % 2 ? 0.5 : -0.5));
    };

    const DAY_CHORDS = [                   // the original gentle daylight progression
      [48, 55, 60, 64],                    // Cmaj
      [45, 52, 60, 64],                    // Am7-ish
      [41, 48, 57, 65],                    // Fmaj
      [43, 50, 59, 62]                     // G-ish
    ];
    const NIGHT_CHORDS = [                 // Zimmer's "Time" wheel — low open voicings
      [45, 52, 57, 60, 64],                // Am
      [40, 47, 52, 55, 59],                // Em
      [43, 50, 55, 59, 62],                // G
      [38, 45, 50, 54, 57]                 // D
    ];
    let ci = 0;
    function playChord() {
      if (!AC) return;
      const night = isMoonlit();
      const HOLD = night ? 18 : 12, FADE = night ? 7 : 5;
      const notes = (night ? NIGHT_CHORDS : DAY_CHORDS)[ci % 4]; ci++;
      const now = AC.currentTime;
      droneGain.gain.setTargetAtTime(night ? 0.05 : 0, now, 5);
      notes.forEach((m, i) => {
        const f = mtof(m);
        // night: additive organ partials (Interstellar); day: the original soft pad pair
        const partials = night
          ? [[f, 'sine', 0, 1], [f * 2, 'sine', 4, 0.4], [f * 3, 'sine', -3, 0.14], [f, 'triangle', 7, 0.22]]
          : [[f, 'sine', -4, 1], [f, 'triangle', 7, 1]];
        const base = night ? 0.03 : 0.045;
        partials.forEach(([freq, type, det, pg]) => {
          const o = AC.createOscillator();
          o.type = type; o.frequency.value = freq; o.detune.value = det;
          const g = AC.createGain();
          g.gain.setValueAtTime(0.0001, now);
          g.gain.linearRampToValueAtTime(base * pg, now + FADE);
          g.gain.setValueAtTime(base * pg, now + HOLD - FADE);
          g.gain.linearRampToValueAtTime(0.0001, now + HOLD);
          const p = makePan(i % 2 ? 0.35 : -0.35);
          o.connect(g); g.connect(p); p.connect(padLP);
          o.start(now); o.stop(now + HOLD + 0.1);
        });
      });
      if (night) {
        // sparse rising motif over the chord — root, fifth, third, up and back
        const times = [2, 5.5, 9, 12.5, 15.2], pick = [0, 2, 4, 3, 2];
        times.forEach((tOff, k) => {
          pluck(notes[pick[k]] + 24, now + tOff + Math.random() * 0.4,
            0.05 + Math.random() * 0.02, k % 2 ? 0.4 : -0.4);
        });
      }
      setTimeout(playChord, (HOLD - FADE) * 1000);   // next chord fades in as this fades out
    }
    playChord();

    // --- occasional soft chimes — pentatonic by day, A-minor under the moon ---
    const PENTA_DAY = [72, 76, 79, 81, 84, 88];
    const PENTA_NIGHT = [69, 72, 76, 79, 81, 84];
    function chime() {
      if (!AC) return;
      const night = isMoonlit();
      const scale = night ? PENTA_NIGHT : PENTA_DAY;
      const now = AC.currentTime;
      const o = AC.createOscillator();
      o.type = 'sine';
      o.frequency.value = mtof(scale[Math.floor(Math.random() * scale.length)]);
      const g = AC.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(night ? 0.04 : 0.055, now + 0.15);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);
      const p = makePan((Math.random() - .5) * 1.2);
      o.connect(g); g.connect(p); p.connect(master);
      g.connect(chimeSend);
      o.start(now); o.stop(now + 3.8);
      setTimeout(chime, (night ? 9000 : 4500) + Math.random() * 8000);
    }
    setTimeout(chime, 6000);
  } catch (e) { /* no audio, no problem */ }
}

function respawnLantern(l, initial) {
  const a = Math.random() * Math.PI * 2;
  const r = initial ? 60 + Math.random() * 300 : 160 + Math.random() * 320;
  const x = state.pos.x + Math.sin(a) * r, z = state.pos.z + Math.cos(a) * r;
  l.position.set(x, Math.max(terrainH(x, z) + 14, state.pos.y - 50 + Math.random() * 110), z);

// -- light-petal burst at the tree --
const PETAL_N = 130;
const petalGeo = new THREE.BufferGeometry();
petalGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(PETAL_N * 3), 3));
const petalMat = new THREE.PointsMaterial({ color: 0xffd9ec, size: 2.4, sizeAttenuation: true,
  map: radialTexture(), transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending });
const petals = new THREE.Points(petalGeo, petalMat);
petals.frustumCulled = false;
petals.position.copy(TREE_POS);
scene.add(petals);
const petalVel = new Float32Array(PETAL_N * 3);
let petalLife = 0;
function treeBurst() {
  const pos = petalGeo.attributes.position;
  for (let i = 0; i < PETAL_N; i++) {
    pos.setXYZ(i, 0, 24, 0);
    const a = Math.random() * Math.PI * 2, up = Math.random();
    const sp = 6 + Math.random() * 14;
    petalVel[i * 3] = Math.sin(a) * sp * (1 - up * .5);
    petalVel[i * 3 + 1] = 4 + up * 14;
    petalVel[i * 3 + 2] = Math.cos(a) * sp * (1 - up * .5);
  }
  pos.needsUpdate = true;
  petalLife = 3;
}

function updateWishes(dt, t) {
  const night = cur.stars > 0.3;
  wishTree.visible = motes.visible = true;
  moteMat.opacity = 0.5 + 0.3 * Math.sin(t * 1.7);
  for (const l of LANTERNS) {
    l.visible = night;
    if (!night) continue;
    l.position.y += l.userData.rise * dt;
    l.position.x += l.userData.drift * dt;
    l.rotation.z = Math.sin(t * 0.9 + l.userData.phase) * 0.12;
    l.userData.glow.opacity = 0.55 + 0.25 * Math.sin(t * 3 + l.userData.phase * 7);
    const d = l.position.distanceTo(state.pos);
    if (flying && d < 7.5) {
      wishes++;
      if (lanternChime) lanternChime();
      if (wishes === 1) showToast('🏮 A wish! Bring it to the glowing tree');
      else if (wishes % 5 === 0) showToast(`🏮 ${wishes} wishes aboard`);
      respawnLantern(l);
    } else if (d > 850 || l.position.y > 420) {
      respawnLantern(l);
    }
  }
  // release at the tree
  if (flying && wishes > 0 &&
      Math.hypot(state.pos.x - TREE_POS.x, state.pos.z - TREE_POS.z) < 34 &&
      state.pos.y - TREE_POS.y < 70) {
    released += wishes;
    showToast(`✨ ${wishes} wish${wishes > 1 ? 'es' : ''} set free!`);
    if (releaseChord) releaseChord();
    netSendWish(wishes);
    wishes = 0;
    treeBurst();
  }
  if (petalLife > 0) {
    petalLife -= dt;
    const pos = petalGeo.attributes.position;
    for (let i = 0; i < PETAL_N; i++) {
      petalVel[i * 3 + 1] -= dt * 3.5;               // drift down like petals
      pos.setXYZ(i,
        pos.getX(i) + petalVel[i * 3] * dt,
        pos.getY(i) + petalVel[i * 3 + 1] * dt,
        pos.getZ(i) + petalVel[i * 3 + 2] * dt);
    }
    pos.needsUpdate = true;
    petalMat.opacity = Math.min(1, petalLife / 1.2);
  } else petalMat.opacity = 0;

  // my aura brightens with every wish aboard
  me.aura.scale.setScalar(8 + Math.min(wishes, 30) * 0.3);
  me.aura.material.opacity = 0.3 + Math.min(wishes, 20) * 0.02;
}

// so friends are never lost: an edge arrow with name + distance whenever a
// buddy is off-screen (or too far to spot), pointing the way to them
const buddyV = new THREE.Vector3();
function updateBuddyTag(p, r) {
  buddyV.copy(r.position).project(camera);
  let nx = buddyV.x, ny = buddyV.y;
  const behind = buddyV.z > 1;
  if (behind) { nx = -nx; ny = -ny; }
  const off = behind || Math.abs(nx) > 0.92 || Math.abs(ny) > 0.86;
  const dist = Math.round(r.position.distanceTo(state.pos));
  if (!off && dist < 260) { p.tag.style.display = 'none'; return; }
  if (off) {  // push to the screen edge along the same direction
    const s = Math.max(Math.abs(nx) / 0.88, Math.abs(ny) / 0.8, 0.0001);
    nx /= s; ny /= s;
  }
  const px = (nx * 0.5 + 0.5) * innerWidth;
  const py = (-ny * 0.5 + 0.5) * innerHeight;
  p.tag.style.display = 'flex';
  p.tag.style.transform = `translate(${px.toFixed(0)}px, ${py.toFixed(0)}px) translate(-50%,-50%)`;
  p.tagArr.style.display = off ? '' : 'none';
  if (off) p.tagArr.style.transform = `rotate(${Math.atan2(-ny, nx).toFixed(3)}rad)`;
  p.tagTxt.textContent = `${p.name} · ${dist >= 1000 ? (dist / 1000).toFixed(1) + ' km' : dist + ' m'}`;
}

function onNetMessage(topic, payload) {
  let d;
  try { d = JSON.parse(payload.toString()); } catch (e) { return; }
  const sub = topic.slice(roomTopic().length + 1);
  if (sub === 'scene') {
    if (d.by !== myId && SCENES[d.i]) setScene(d.i, true);
    return;
  }
  if (!sub.startsWith('p/')) return;
  const id = sub.slice(2);
  if (id === myId) return;
  if (d.bye) {
    const p = players.get(id);
    if (p) { showToast(`${p.name} flew away 👋`); removePlayer(id); }
    return;
  }
  if (d.t === 'wish') {
    const p = players.get(id);
    showToast(`✨ ${p ? p.name : 'A wanderer'} set ${d.n} wish${d.n > 1 ? 'es' : ''} free!`);
    treeBurst();
    if (releaseChord) releaseChord();
    return;
  }
  if (!Array.isArray(d.p)) return;
  const isNew = !players.has(id);
  if (isNew) {
    addPlayer(id, d.n);
    if (!players.has(id)) return;   // room already full
    showToast(`${d.n || 'A pilot'} joined 🕊️`);
  }
  applyRemoteState(id, d);
  if (isNew) {
    const p = players.get(id);
    p.plane.rig.position.copy(p.target.pos);
    if (spawnNearOthers) {
      // joined an in-progress flight — appear beside the flock, not at the origin
      spawnNearOthers = false;
      state.pos.set(d.p[0] + 10 + Math.random() * 14, Math.max(30, d.p[1]), d.p[2] + (Math.random() - .5) * 16);
    }
  }
}

function roomLink() {
  return location.origin + location.pathname + '?room=' + roomCode;
}
function showHostLink() {
  mpStatus.innerHTML = '';
  const line = document.createElement('div');
  line.textContent = `Room ${roomCode} — anyone with this link joins your sky:`;
  const linkEl = document.createElement('a');
  linkEl.href = roomLink(); linkEl.textContent = roomLink();
  linkEl.onclick = e => e.preventDefault();
  const btns = document.createElement('div');
  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copy link';
  copyBtn.onclick = () => {
    (navigator.clipboard ? navigator.clipboard.writeText(roomLink()) : Promise.reject())
      .then(() => copyBtn.textContent = 'Copied ✓')
      .catch(() => { linkEl.focus(); copyBtn.textContent = roomLink(); });
  };
  btns.appendChild(copyBtn);
  if (navigator.share) {
    const shareBtn = document.createElement('button');
    shareBtn.textContent = 'Share…';
    shareBtn.onclick = () => navigator.share({ title: 'Sky Drift', text: 'Come fly with me 🕊️', url: roomLink() }).catch(() => {});
    btns.appendChild(shareBtn);
  }
  mpStatus.append(line, linkEl, btns);
}

function connectRoom(code, asHost, attempt = 0) {
  if (attempt >= BROKERS.length) {
    mpStatus.textContent = 'Couldn\'t reach the sky servers — check your internet and try again.';
    client = null; roomCode = null;
    return;
  }
  roomCode = code;
  mpStatus.textContent = attempt === 0 ? 'Connecting to the sky…'
    : `Still connecting — trying another route (${attempt + 1}/${BROKERS.length})…`;
  const c = mqtt.connect(BROKERS[attempt], {
    clientId: 'skydrift_' + myId,
    clean: true, connectTimeout: 8000, keepalive: 30, reconnectPeriod: 3000,
    // broker tells everyone if this tab dies without saying goodbye
    will: { topic: 'skydrift-mk1/' + code + '/p/' + myId, payload: JSON.stringify({ bye: 1 }), qos: 0, retain: false }
  });
  client = c;
  let everConnected = false;
  const nextBroker = () => {
    if (everConnected || client !== c) return;
    c.end(true);
    client = null;
    connectRoom(code, asHost, attempt + 1);
  };
  const failTimer = setTimeout(nextBroker, 9000);
  c.on('error', nextBroker);
  c.on('connect', () => {
    clearTimeout(failTimer);
    everConnected = true;
    c.subscribe(roomTopic() + '/#', err => {
      if (err || joined) return;
      joined = true;
      myBodyMat.color.setHex(colorOf(myId));
      netPublishState();               // announce myself right away
      if (asHost) {
        showHostLink();
        document.getElementById('soloBtn').textContent = `Take off 🕊️ (room ${roomCode})`;
      } else {
        mpStatus.textContent = '';
        showToast('🕊️🕊️ You joined the sky!');
        startFlight();
      }
    });
  });
  c.on('message', onNetMessage);
}

function hostFlight() {
  if (client) return;
  const code = Array.from({ length: 4 }, () => CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)]).join('');
  connectRoom(code, true);
}

function joinFlight(code) {
  if (client) return;
  if (!code || code.length < 4) { mpStatus.textContent = 'Type the 4-letter room code first'; return; }
  spawnNearOthers = true;
  connectRoom(code.toUpperCase(), false);
}

// tell the others right away when this tab closes (the broker's will covers crashes)
addEventListener('pagehide', () => {
  try { if (client && joined) client.publish(roomTopic() + '/p/' + myId, JSON.stringify({ bye: 1 })); }
  catch (e) { /* best effort */ }
});
// heartbeat via setInterval — keeps running when the tab is backgrounded (rAF doesn't)
setInterval(() => { if (joined) netPublishState(); }, 2000);
// stale sweep — long fuse so throttled background tabs aren't kicked
const STALE_MS = 70000;
setInterval(() => {
  const now = performance.now();
  for (const [id, p] of players) {
    if (now - p.lastSeen > STALE_MS) {
      removePlayer(id);
      showToast(`${p.name} flew away 👋`);
    }
  }
}, 5000);

document.getElementById('soloBtn').onclick = startFlight;
document.getElementById('hostBtn').onclick = hostFlight;
document.getElementById('joinBtn').onclick = () => joinFlight(joinInput.value.trim().toUpperCase());
joinInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') joinFlight(joinInput.value.trim().toUpperCase());
});

// invited via link? pre-fill the room and make joining the main action
const urlRoom = (new URLSearchParams(location.search).get('room') || '').trim().toUpperCase();
if (urlRoom) {
  joinInput.value = urlRoom;
  const solo = document.getElementById('soloBtn');
  solo.textContent = `Join the flight 🕊️ (room ${urlRoom})`;
  solo.onclick = () => joinFlight(urlRoom);
  document.getElementById('hostBtn').style.display = 'none';
  mpStatus.textContent = 'You\'ve been invited to a shared sky — pick a name and hop in!';
  nameInput.focus();
}

// ---------------- Flight + world update ----------------
const FWD = new THREE.Vector3();
const camTarget = new THREE.Vector3();
const moonDirTmp = new THREE.Vector3(), cloudDirTmp = new THREE.Vector3();
const silverCol = new THREE.Color(0xdfe9ff);

function updateFlight(dt, t) {
  const left = keys['ArrowLeft'] || keys['KeyA'], right = keys['ArrowRight'] || keys['KeyD'];
  const up = keys['ArrowUp'] || keys['KeyW'], down = keys['ArrowDown'] || keys['KeyS'];
  let steer = (left ? 1 : 0) + (right ? -1 : 0) - touchInput.x;
  let climb = (up ? 1 : 0) + (down ? -1 : 0) - touchInput.y;
  steer = Math.max(-1, Math.min(1, steer));
  climb = Math.max(-1, Math.min(1, climb));
  const boost = keys['ShiftLeft'] || keys['ShiftRight'] || touchInput.boost;

  const targetRoll = steer * 0.55;
  const targetPitch = climb * 0.30;
  state.roll += (targetRoll - state.roll) * Math.min(1, dt * 2.5);
  state.pitch += (targetPitch - state.pitch) * Math.min(1, dt * 2.2);
  state.yaw += state.roll * dt * 0.85;

  const speed = boost ? 55 : 26;
  FWD.set(0, 0, -1).applyEuler(new THREE.Euler(state.pitch, state.yaw, 0, 'YXZ'));
  state.pos.addScaledVector(FWD, speed * dt);

  // gentle altitude limits — the sky is a comfy place, hills included
  const floorY = Math.max(10, terrainH(state.pos.x, state.pos.z) + 8);
  if (state.pos.y < floorY) { state.pos.y = floorY; state.pitch = Math.max(state.pitch, 0); }
  if (state.pos.y > 400) { state.pos.y = 400; state.pitch = Math.min(state.pitch, 0); }

  rig.position.copy(state.pos);
  rig.rotation.set(state.pitch, state.yaw, state.roll);
  if (rollAnim > 0) {
    rollAnim = Math.min(1, rollAnim + dt / 0.85);
    const ease = rollAnim * rollAnim * (3 - 2 * rollAnim);
    rollFx = ease * Math.PI * 2;
    rig.rotation.z = state.roll + rollFx;
    if (rollAnim >= 1) { rollAnim = 0; rollFx = 0; }
  }
  model.position.y = Math.sin(t * 1.6) * 0.25;
  boostAmt += ((boost ? 1 : 0) - boostAmt) * Math.min(1, dt * 4);
  flyerPose(me, t, 0, boostAmt, state.pitch);

  // chase camera + free look: drag offsets orbit around the wanderer,
  // then ease back behind the shoulders once released
  const looking = camDrag.mouse || lookId !== null;
  if (!looking) {
    const ease = 1 - Math.exp(-dt * 2.2);
    camDrag.yaw -= camDrag.yaw * ease;
    camDrag.pitch -= camDrag.pitch * ease;
  }
  const back = new THREE.Vector3(0, 3.4, 10.5)
    .applyEuler(new THREE.Euler(state.pitch * 0.5 + camDrag.pitch, state.yaw + camDrag.yaw, 0, 'YXZ'));
  camTarget.copy(state.pos).add(back);
  camera.position.lerp(camTarget, 1 - Math.exp(-dt * (looking ? 9 : 3.2)));
  const orbit = Math.min(1, (Math.abs(camDrag.yaw) + Math.abs(camDrag.pitch)) * 2.5);
  const lookAt = state.pos.clone().addScaledVector(FWD, 10 * (1 - orbit));
  camera.lookAt(lookAt);
  camera.rotateZ(-state.roll * 0.35 * (1 - orbit));

  // speed rush — widen the view while boosting
  const targetFov = boost ? 74 : 65;
  if (Math.abs(camera.fov - targetFov) > 0.05) {
    camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 3);
    camera.updateProjectionMatrix();
  }
  return boost;
}

function recycleClouds() {
  for (const c of clouds) {
    const dx = c.position.x - state.pos.x, dz = c.position.z - state.pos.z;
    const dist = Math.hypot(dx, dz);
    if (dist > 700) {
      const a = state.yaw + (Math.random() - .5) * 1.6;
      const r = 350 + Math.random() * 350;
      c.position.set(
        state.pos.x - Math.sin(a) * r,
        20 + Math.random() * 190,
        state.pos.z - Math.cos(a) * r
      );
    }
  }
}

// smooth-lerp all scene params toward target
const tmpV = new THREE.Vector3();
function lerpScene(dt) {
  const k = 1 - Math.exp(-dt * 1.4);
  const lc = (c, hex) => c.lerp(new THREE.Color(hex), k);
  lc(cur.top, target.top); lc(cur.bottom, target.bottom); lc(cur.fog, target.fog);
  lc(cur.ground, target.ground); lc(cur.cloud, target.cloud); lc(cur.orbCol, target.orbCol);
  lc(cur.hemiCol, target.hemiCol); lc(cur.dirCol, target.dirCol);
  cur.fogNear += (target.fogNear - cur.fogNear) * k;
  cur.fogFar += (target.fogFar - cur.fogFar) * k;
  cur.cloudOp += (target.cloudOp - cur.cloudOp) * k;
  cur.stars += (target.stars - cur.stars) * k;
  cur.orb += (target.orb - cur.orb) * k;
  cur.orbScale += (target.orbScale - cur.orbScale) * k;
  cur.hemi += (target.hemi - cur.hemi) * k;
  cur.dir += (target.dir - cur.dir) * k;
  cur.city += ((target.city || 0) - cur.city) * k;
  cur.ocean += ((target.ocean || 0) - cur.ocean) * k;
  cur.aurora += ((target.aurora || 0) - cur.aurora) * k;
  cur.moonTex += ((target.moonTex || 0) - cur.moonTex) * k;
  cur.orbPos.lerp(tmpV.set(...target.orbPos), k);

  skyMat.uniforms.topColor.value.copy(cur.top);
  skyMat.uniforms.bottomColor.value.copy(cur.bottom);
  skyMat.uniforms.sunColor.value.copy(cur.orbCol);
  skyMat.uniforms.sunDir.value.copy(cur.orbPos).normalize();
  skyMat.uniforms.sunAmt.value = cur.orb;
  scene.fog.color.copy(cur.fog);
  scene.fog.near = cur.fogNear; scene.fog.far = cur.fogFar;
  groundMat.color.copy(cur.ground);
  cloudMat.color.copy(cur.cloud); cloudMat.opacity = cur.cloudOp;
  orbMat.color.copy(cur.orbCol); orbMat.opacity = cur.orb;
  glowMat.color.copy(cur.orbCol); glowMat.opacity = cur.orb * .8;
  orb.scale.setScalar(cur.orbScale);
  moonFace.scale.setScalar(cur.orbScale);
  moonFaceMat.opacity = cur.moonTex * cur.orb;
  haloMat.opacity = cur.moonTex * cur.orb * 0.55;
  halo.scale.set(560 * cur.orbScale, 560 * cur.orbScale, 1);
  glow.scale.set(340 * cur.orbScale, 340 * cur.orbScale, 1);
  hemiLight.color.copy(cur.hemiCol); hemiLight.intensity = cur.hemi;
  dirLight.color.copy(cur.dirCol); dirLight.intensity = cur.dir;
  milkyMat.opacity = cur.stars * 0.5;
  vilMat.uniforms.globalOp.value = cur.stars * Math.max(0, 1 - cur.city - cur.ocean);
  lakeMat.color.copy(lakeDayCol).lerp(lakeNightCol, cur.stars);
}
cur.city = target.city;
cur.ocean = target.ocean || 0;

// ---------------- Main loop ----------------
const clock = new THREE.Clock();
let statTick = 0;

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  let boosting = false;
  if (flying) boosting = updateFlight(dt, t);
  else { // idle drift behind the title screen
    state.pos.z -= 8 * dt;
    rig.position.copy(state.pos);
    camera.position.set(state.pos.x + 10, state.pos.y + 4, state.pos.z + 16);
    camera.lookAt(state.pos);
    flyerPose(me, t, 0, 0, 0);
  }

  // ----- multiplayer sync -----
  netTimer += dt;
  if (netTimer > 0.1 && joined) {
    netTimer = 0;
    netPublishState();
  }
  for (const p of players.values()) {
    const k = 1 - Math.exp(-dt * 8);
    const r = p.plane.rig;
    r.position.lerp(p.target.pos, k);
    r.rotation.x += (p.target.pitch - r.rotation.x) * k;
    r.rotation.y += (p.target.yaw - r.rotation.y) * k;
    r.rotation.z += (p.target.roll - r.rotation.z) * k;
    p.plane.model.position.y = Math.sin(t * 1.6 + p.phase) * 0.25;
    flyerPose(p.plane, t, p.phase, 0, p.target.pitch);
    p.plane.aura.scale.setScalar(8 + Math.min(p.wishes || 0, 30) * 0.3);
    p.plane.aura.material.opacity = 0.3 + Math.min(p.wishes || 0, 20) * 0.02;
    updateBuddyTag(p, r);
  }
  updateWishes(dt, t);
  updateTreeTag();
  trailAcc += dt;
  if (trailAcc >= 0.045) {
    trailAcc = 0;
    if (flying) {
      rig.updateMatrixWorld(true);
      planeTrails(model, trailL, trailR);
    }
    for (const p of players.values()) {
      p.plane.rig.updateMatrixWorld(true);
      planeTrails(p.plane.model, p.trailL, p.trailR);
    }
  }

  // clouds drift; the ones toward the moon catch a silver lining at night
  moonDirTmp.copy(cur.orbPos).normalize();
  for (const c of clouds) {
    c.position.x += c.userData.drift * dt;
    const m = c.userData.mat;
    const s = Math.pow(Math.max(0, cloudDirTmp.copy(c.position).sub(state.pos).normalize().dot(moonDirTmp)), 5)
            * cur.moonTex;
    m.color.copy(cur.cloud).lerp(silverCol, s * 0.8);
    m.opacity = cur.cloudOp;
  }
  recycleClouds();

  // aurora waves + nav-light blinking
  for (const r of auroraRibbons) {
    r.material.uniforms.time.value = t;
    r.material.uniforms.amp.value = cur.aurora * (0.8 + 0.2 * Math.sin(t * 0.13 + r.material.uniforms.phase.value));
  }
  vilMat.uniforms.time.value = t;
  villages.visible = vilMat.uniforms.globalOp.value > 0.02;
  const st = t % 1.6;
  navMats.strobe.opacity = (st < .07 || (st > .16 && st < .23)) ? 1 : .12;
  navMats.red.opacity = navMats.green.opacity = .6 + .4 * Math.sin(t * 3.4);

  // a far-off red-eye flight, only under starry skies
  {
    const u = airliner.userData;
    if (!airliner.visible) {
      u.wait -= dt;
      if (u.wait <= 0 && cur.stars > 0.4) {
        const a = Math.random() * Math.PI * 2;
        airliner.position.set(state.pos.x + Math.sin(a) * 900, 430 + Math.random() * 90, state.pos.z + Math.cos(a) * 900);
        const b = a + Math.PI + (Math.random() - .5) * 0.9;
        u.vx = Math.sin(b) * 55; u.vz = Math.cos(b) * 55;
        airliner.rotation.y = Math.atan2(u.vx, u.vz) + Math.PI;
        airliner.visible = true;
      }
    } else {
      airliner.position.x += u.vx * dt;
      airliner.position.z += u.vz * dt;
      if (Math.hypot(airliner.position.x - state.pos.x, airliner.position.z - state.pos.z) > 1500) {
        airliner.visible = false;
        u.wait = 45 + Math.random() * 75;
      }
    }
  }
  for (const b of balloons) {
    b.position.x += b.userData.drift * dt;
    b.position.y += Math.sin(t * 0.5 + b.userData.phase) * dt * 1.2;
    if (Math.hypot(b.position.x - state.pos.x, b.position.z - state.pos.z) > 850) {
      const a = state.yaw + (Math.random() - .5) * 1.4;
      const r = 400 + Math.random() * 380;
      b.position.set(state.pos.x - Math.sin(a) * r, 45 + Math.random() * 140, state.pos.z - Math.cos(a) * r);
    }
  }
  updateBirds(dt, t, state.pos.x, state.pos.z);
  updateCity(state.pos.x, state.pos.z);
  lerpScene(dt);

  // roads + traffic (city scene)
  roads.visible = cur.city > 0.03;
  carsGroup.visible = cur.city > 0.05;
  if (roads.visible) {
    roadMat.opacity = cur.city * 0.95;
    roads.position.set(Math.round(state.pos.x / CHUNK) * CHUNK, 0.25, Math.round(state.pos.z / CHUNK) * CHUNK);
  }
  if (carsGroup.visible) for (const car of cars) {
    const u = car.userData;
    car.position[u.axis] += u.dir * u.speed * dt;
    if (Math.hypot(car.position.x - state.pos.x, car.position.z - state.pos.z) > 620) {
      resetCar(car, state.pos.x, state.pos.z);
    }
  }

  // ocean: waves, islands, drifting boats
  updateWater(state.pos.x, state.pos.z, t);
  oceanGroup.visible = cur.ocean > 0.05;
  if (oceanGroup.visible) {
    for (const isl of islands) {
      if (Math.hypot(isl.position.x - state.pos.x, isl.position.z - state.pos.z) > 1150) {
        const a = state.yaw + (Math.random() - .5) * 1.6;
        const r = 500 + Math.random() * 500;
        isl.position.set(state.pos.x - Math.sin(a) * r, 0, state.pos.z - Math.cos(a) * r);
      }
    }
    for (const b of boats) {
      b.position.x += b.userData.vx * dt;
      b.position.z += b.userData.vz * dt;
      b.position.y = 3 + waveH(b.position.x, b.position.z, t) * 0.85;
      b.rotation.z = Math.sin(t * 1.1 + b.userData.phase) * 0.07;
      b.rotation.y = Math.atan2(b.userData.vx, b.userData.vz) + Math.PI;
      if (Math.hypot(b.position.x - state.pos.x, b.position.z - state.pos.z) > 900) {
        const a = state.yaw + (Math.random() - .5) * 1.6;
        const r = 350 + Math.random() * 400;
        b.position.set(state.pos.x - Math.sin(a) * r, 3, state.pos.z - Math.cos(a) * r);
      }
    }
  }

  // key light tracks the actual moon/sun direction, so lakes catch its reflection
  dirLight.position.copy(state.pos).addScaledVector(moonDirTmp, 420);
  dirLight.target.position.copy(state.pos);

  // mist pools drift through the hollows; fireflies wander
  flyMat.uniforms.time.value = t;
  flyMat.uniforms.globalOp.value = cur.stars * hillScale;
  fireflies.visible = flyMat.uniforms.globalOp.value > 0.03;
  for (const m of mists) {
    m.position.x += m.userData.drift * dt;
    m.material.opacity = cur.stars * 0.16 * hillScale;
    if (Math.hypot(m.position.x - state.pos.x, m.position.z - state.pos.z) > 750) {
      const a = Math.random() * Math.PI * 2, r = 250 + Math.random() * 400;
      m.position.set(state.pos.x - Math.sin(a) * r, 0, state.pos.z - Math.cos(a) * r);
    }
    m.position.y = terrainH(m.position.x, m.position.z) + 9;
  }

  // shooting stars, only under starry skies
  if (shootLife > 0) {
    shootLife -= dt;
    shootPos.addScaledVector(shootVel, dt);
    const p = shootGeo.attributes.position;
    p.setXYZ(0, shootPos.x, shootPos.y, shootPos.z);
    p.setXYZ(1, shootPos.x - shootVel.x * 0.14, shootPos.y - shootVel.y * 0.14, shootPos.z - shootVel.z * 0.14);
    p.needsUpdate = true;
    shootMat.opacity = Math.sin(Math.min(1, 1 - shootLife / 1.1) * Math.PI) * cur.stars;
    if (shootLife <= 0) { shootMat.opacity = 0; shootWait = 4 + Math.random() * 8; }
  } else if (cur.stars > 0.4) {
    shootWait -= dt;
    if (shootWait <= 0) {
      shootLife = 1.1;
      const a = Math.random() * Math.PI * 2;
      shootPos.set(state.pos.x + Math.sin(a) * 500, 320 + Math.random() * 200, state.pos.z + Math.cos(a) * 500);
      shootVel.set((Math.random() - .5) * 300, -140 - Math.random() * 80, (Math.random() - .5) * 300);
    }
  }
  starsA.mat.opacity = cur.stars * (0.88 + 0.12 * Math.sin(t * 2.7));
  starsB.mat.opacity = cur.stars * (0.7 + 0.3 * Math.sin(t * 1.9 + 2.1));

  // world anchors follow the plane
  sky.position.copy(state.pos);
  starsA.pts.position.copy(state.pos);
  starsB.pts.position.copy(state.pos);
  milky.position.copy(state.pos);
  auroraGroup.position.set(state.pos.x, 0, state.pos.z);
  orbGroup.position.copy(state.pos).add(cur.orbPos);
  updateGround(state.pos.x, state.pos.z);

  statTick += dt;
  if (statTick > 0.25) {
    statTick = 0;
    let extra = '';
    if (players.size > 0) extra = `<br>👥 ${players.size + 1} flying together`;
    else if (joined && roomCode) extra = `<br>🔑 room ${roomCode} — share the link!`;
    const wishLine = (wishes || released) ? `<br>🏮 ${wishes} · ✨ ${released}` : '';
    statsEl.innerHTML = `⛰️ ${Math.round(state.pos.y)} m<br>💨 ${boosting ? 55 : 26} m/s${wishLine}${extra}`;
  }

  renderer.render(scene, camera);
});

// tiny debug handle for automated tests
window.__sky = { camDrag, touchInput, players, state, TREE_POS, LANTERNS,
  get wishes() { return wishes; }, get released() { return released; } };
</script>
