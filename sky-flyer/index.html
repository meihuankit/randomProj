<style>

  #overlay input {
    text-align: center; font-family: inherit; font-size: 1rem; font-weight: 700;

  }
  #nameInput { width: 15ch; }

    border: 2px solid rgba(255,255,255,.28); background: rgba(8,14,34,.5); color: #fff;

<body>

<script type="module">
import * as THREE from 'three';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

const isTouch = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;

// ---------------- Scenes (moods) ----------------
const SCENES = [
  { name: '🌙 Moonlit Night', top: 0x1c2b60, bottom: 0x0a1030, fog: 0x0d1436, fogNear: 160, fogFar: 950,
    ground: 0x0b1c3a, cloud: 0x3b4878, cloudOp: .8, stars: .9, orb: 1, orbCol: 0xf8f4d8, orbPos: [260, 340, -700], orbScale: 1,
    hemi: .45, hemiCol: 0x93a7e0, dir: .55, dirCol: 0xcdd9ff, city: 0 },
  { name: '🌃 City Lights', top: 0x191632, bottom: 0x0b0a18, fog: 0x100e22, fogNear: 120, fogFar: 800,
    ground: 0x07070f, cloud: 0x262038, cloudOp: .55, stars: .5, orb: .6, orbCol: 0xe8e4c8, orbPos: [-380, 380, -600], orbScale: .55,
    hemi: .4, hemiCol: 0x7a74b8, dir: .35, dirCol: 0xaab, city: 1 },
  { name: '🌅 Golden Sunset', top: 0xff9e5e, bottom: 0xffc98a, fog: 0xffb98a, fogNear: 130, fogFar: 850,
    ground: 0xc96f4a, cloud: 0xffd9c4, cloudOp: .9, stars: 0, orb: 1, orbCol: 0xffe0b0, orbPos: [0, 90, -900], orbScale: 1.5,
    hemi: .75, hemiCol: 0xffcf9e, dir: .8, dirCol: 0xffb37a, city: 0 },
  { name: '☁️ Blue Day', top: 0x6fb9e8, bottom: 0xcfeaf7, fog: 0xd4ecf8, fogNear: 180, fogFar: 1100,
    ground: 0x5b9e6e, cloud: 0xffffff, cloudOp: .95, stars: 0, orb: .9, orbCol: 0xfff6d8, orbPos: [320, 420, -450], orbScale: .8,
    hemi: 1, hemiCol: 0xeaf6ff, dir: 1.1, dirCol: 0xfff2d8, city: 0 },
  { name: '🌊 Ocean Isles', top: 0x4fa8e0, bottom: 0xc2e8f7, fog: 0xcfeaf5, fogNear: 170, fogFar: 1000,
    ground: 0xc9b98a, cloud: 0xffffff, cloudOp: .9, stars: 0, orb: 1, orbCol: 0xfff2cc, orbPos: [300, 380, -520], orbScale: .9,
    hemi: .95, hemiCol: 0xeaf8ff, dir: 1.15, dirCol: 0xfff4da, city: 0, ocean: 1 }
];
let target = SCENES[0];

// live-lerped params
const cur = {
  top: new THREE.Color(target.top), bottom: new THREE.Color(target.bottom), fog: new THREE.Color(target.fog),
  ground: new THREE.Color(target.ground), cloud: new THREE.Color(target.cloud), orbCol: new THREE.Color(target.orbCol),
  hemiCol: new THREE.Color(target.hemiCol), dirCol: new THREE.Color(target.dirCol),
  fogNear: target.fogNear, fogFar: target.fogFar, cloudOp: target.cloudOp, stars: target.stars,
  orb: target.orb, orbScale: target.orbScale, hemi: target.hemi, dir: target.dir,
  orbPos: new THREE.Vector3(...target.orbPos)
};

// ---------------- Renderer / scene ----------------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(cur.fog.clone(), cur.fogNear, cur.fogFar);
const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 3000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, isTouch ? 1.6 : 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.style.touchAction = 'none';
document.body.appendChild(renderer.domElement);

const hemiLight = new THREE.HemisphereLight(cur.hemiCol, 0x3a3a4a, cur.hemi);
scene.add(hemiLight);
const dirLight = new THREE.DirectionalLight(cur.dirCol, cur.dir);
dirLight.position.set(150, 300, -200);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(isTouch ? 512 : 1024, isTouch ? 512 : 1024);
Object.assign(dirLight.shadow.camera, { left: -160, right: 160, top: 160, bottom: -160, near: 1, far: 800 });
scene.add(dirLight, dirLight.target);

// ---------------- Sky dome (with sun/moon glow + horizon haze) ----------------
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor: { value: cur.top.clone() }, bottomColor: { value: cur.bottom.clone() },
    sunDir: { value: new THREE.Vector3(0, 1, 0) }, sunColor: { value: cur.orbCol.clone() },
    sunAmt: { value: 1 }
  },
  vertexShader: `varying vec3 vDir;
    void main() {
      vDir = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor;
    uniform vec3 sunDir; uniform vec3 sunColor; uniform float sunAmt;
    varying vec3 vDir;
    void main() {
      vec3 d = normalize(vDir);
      float h = clamp(d.y * 1.6 + 0.25, 0.0, 1.0);
      vec3 col = mix(bottomColor, topColor, pow(h, 0.8));
      float s = max(dot(d, sunDir), 0.0);
      col += sunColor * pow(s, 26.0) * 0.6 * sunAmt;   // bright halo hugging the orb
      col += sunColor * pow(s, 4.0) * 0.14 * sunAmt;   // wide atmospheric wash
      col += bottomColor * pow(1.0 - abs(d.y), 6.0) * 0.28;  // horizon haze band
      gl_FragColor = vec4(col, 1.0);
    }`,
  side: THREE.BackSide, depthWrite: false, fog: false
});
const sky = new THREE.Mesh(new THREE.SphereGeometry(1400, 24, 16), skyMat);
scene.add(sky);

// ---------------- Stars (two layers: dust + bright twinklers) ----------------
function starField(count, size) {
  const pos = [];
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2, p = Math.acos(Math.random() * 0.95);
    const r = 1150;
    pos.push(r * Math.sin(p) * Math.cos(t), r * Math.cos(p), r * Math.sin(p) * Math.sin(t));
  }
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size, sizeAttenuation: false,
    transparent: true, opacity: cur.stars, fog: false, depthWrite: false });
  const pts = new THREE.Points(
    new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(pos, 3)), mat);
  scene.add(pts);
  return { pts, mat };
}
const starsA = starField(850, 1.7);
const starsB = starField(130, 3.1);   // the bright ones twinkle out of phase

// ---------------- Moon / Sun orb with glow ----------------
function radialTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 4, 64, 64, 64);
  g.addColorStop(0, 'rgba(255,255,255,.9)'); g.addColorStop(0.35, 'rgba(255,255,255,.28)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const orbGroup = new THREE.Group();
const orbMat = new THREE.MeshBasicMaterial({ color: cur.orbCol, fog: false, transparent: true, opacity: cur.orb });
const orb = new THREE.Mesh(new THREE.SphereGeometry(42, 24, 16), orbMat);
const glowMat = new THREE.SpriteMaterial({ map: radialTexture(), color: cur.orbCol, fog: false,
  transparent: true, opacity: cur.orb * .8, depthWrite: false });
const glow = new THREE.Sprite(glowMat);
glow.scale.set(340, 340, 1);
orbGroup.add(orb, glow);
scene.add(orbGroup);

// ---------------- Ground (rolling hills) ----------------
const groundMat = new THREE.MeshLambertMaterial({ color: cur.ground, vertexColors: true });
const G_SIZE = 2600, G_SEG = 100, G_STEP = G_SIZE / G_SEG;
const groundGeo = new THREE.PlaneGeometry(G_SIZE, G_SIZE, G_SEG, G_SEG);
groundGeo.rotateX(-Math.PI / 2);
groundGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(groundGeo.attributes.position.count * 3), 3));
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.receiveShadow = true;
scene.add(ground);

function nHash(x, z) { const s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453; return s - Math.floor(s); }
function nSmooth(x, z) {
  const xi = Math.floor(x), zi = Math.floor(z), xf = x - xi, zf = z - zi;
  const u = xf * xf * (3 - 2 * xf), v = zf * zf * (3 - 2 * zf);
  const a = nHash(xi, zi), b = nHash(xi + 1, zi), c = nHash(xi, zi + 1), d = nHash(xi + 1, zi + 1);
  return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
}
let hillScale = 1;   // hills flatten in the city scene so towers sit on level ground
function terrainH(x, z) {
  const n = nSmooth(x * 0.004, z * 0.004) + nSmooth(x * 0.011 + 13.7, z * 0.011 + 91.3) * 0.35;
  return (n - 0.55) * 26 * hillScale;
}
let gCX = Infinity, gCZ = Infinity, gHS = -1;
function updateGround(px, pz) {
  hillScale = Math.max(0, 1 - cur.city - cur.ocean);
  const cx = Math.round(px / G_STEP) * G_STEP, cz = Math.round(pz / G_STEP) * G_STEP;
  if (cx === gCX && cz === gCZ && Math.abs(hillScale - gHS) < 0.02) return;
  gCX = cx; gCZ = cz; gHS = hillScale;
  ground.position.set(cx, 0, cz);
  const pos = groundGeo.attributes.position, col = groundGeo.attributes.color;
  for (let i = 0; i < pos.count; i++) {
    const h = terrainH(pos.getX(i) + cx, pos.getZ(i) + cz);
    pos.setY(i, h);
    const tint = 0.8 + (h / 26 + 0.55) * 0.35;   // valleys darker, hilltops brighter
    col.setXYZ(i, tint, tint, tint);
  }
  pos.needsUpdate = true; col.needsUpdate = true;
  groundGeo.computeVertexNormals();
  updateTrees(cx, cz);
}

// ---------------- Trees on the hills ----------------
const TREE_N = 260;
const trunkMesh = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.5, 0.7, 4, 6),
  new THREE.MeshLambertMaterial({ color: 0x6b4a2f }), TREE_N);
const canopyMesh = new THREE.InstancedMesh(new THREE.ConeGeometry(3.4, 8, 8),
  new THREE.MeshLambertMaterial({ color: 0x2f7a45 }), TREE_N);
trunkMesh.castShadow = canopyMesh.castShadow = true;
scene.add(trunkMesh, canopyMesh);
const treeMat4 = new THREE.Matrix4();
function updateTrees(cx, cz) {
  const show = hillScale > 0.4;
  trunkMesh.visible = canopyMesh.visible = show;
  if (!show) return;
  let n = 0;
  const CELL = 80, rr = Math.ceil(1100 / CELL);
  const ci = Math.round(cx / CELL), cj = Math.round(cz / CELL);
  for (let dj = -rr; dj <= rr && n < TREE_N; dj++) for (let di = -rr; di <= rr && n < TREE_N; di++) {
    const rnd = mulberry32((ci + di) * 73856093 ^ (cj + dj) * 19349663 ^ 0x2f);
    if (rnd() < 0.45) continue;                       // empty cell
    const x = (ci + di) * CELL + (rnd() - .5) * CELL * 0.9;
    const z = (cj + dj) * CELL + (rnd() - .5) * CELL * 0.9;
    const h = terrainH(x, z);
    if (h < 3) continue;                              // trees prefer the hills
    const s = 0.8 + rnd() * 0.9;
    trunkMesh.setMatrixAt(n, treeMat4.makeScale(s, s, s).setPosition(x, h + 2 * s, z));
    canopyMesh.setMatrixAt(n, treeMat4.makeScale(s, s, s).setPosition(x, h + 6.5 * s, z));
    n++;
  }
  for (; n < TREE_N; n++) {                           // park unused instances out of sight
    treeMat4.makeScale(0.001, 0.001, 0.001).setPosition(0, -80, 0);
    trunkMesh.setMatrixAt(n, treeMat4);
    canopyMesh.setMatrixAt(n, treeMat4);
  }
  trunkMesh.instanceMatrix.needsUpdate = true;
  canopyMesh.instanceMatrix.needsUpdate = true;
}

// ---------------- Ocean water ----------------
const W_SEG = 72, W_SIZE = 2600;
const waterGeo = new THREE.PlaneGeometry(W_SIZE, W_SIZE, W_SEG, W_SEG);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = new THREE.MeshPhongMaterial({ color: 0x1e6f9e, specular: 0xaaddff,
  shininess: 90, transparent: true, opacity: 0 });
const water = new THREE.Mesh(waterGeo, waterMat);
water.visible = false;
water.receiveShadow = true;
scene.add(water);
function waveH(x, z, t) {
  return Math.sin(x * 0.075 + t * 1.5) * 0.8 + Math.sin(z * 0.06 + t * 1.1) * 0.7
       + Math.sin((x + z) * 0.04 + t * 0.8);
}
function updateWater(px, pz, t) {
  water.visible = cur.ocean > 0.02;
  waterMat.opacity = Math.min(1, cur.ocean * 1.25);
  if (!water.visible) return;
  const step = W_SIZE / W_SEG;
  const cx = Math.round(px / step) * step, cz = Math.round(pz / step) * step;
  water.position.set(cx, 3, cz);
  const pos = waterGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) pos.setY(i, waveH(pos.getX(i) + cx, pos.getZ(i) + cz, t));
  pos.needsUpdate = true;
  waterGeo.computeVertexNormals();
}

// ---------------- Islands & sailboats (ocean scene) ----------------
const oceanGroup = new THREE.Group();
oceanGroup.visible = false;
scene.add(oceanGroup);
const islands = [], boats = [];
for (let i = 0; i < 5; i++) {
  const g = new THREE.Group();
  const sand = new THREE.Mesh(new THREE.ConeGeometry(30 + Math.random() * 16, 7, 22),
    new THREE.MeshLambertMaterial({ color: 0xe8d8a8 }));
  sand.position.y = 1.5;
  const hill = new THREE.Mesh(new THREE.ConeGeometry(15 + Math.random() * 8, 13 + Math.random() * 9, 16),
    new THREE.MeshLambertMaterial({ color: 0x3f9155 }));
  hill.position.y = 8;
  sand.castShadow = hill.castShadow = sand.receiveShadow = true;
  g.add(sand, hill);
  g.position.set((Math.random() - .5) * 1400, 0, (Math.random() - .5) * 1400);
  islands.push(g);
  oceanGroup.add(g);
}
{
  const hullMat = new THREE.MeshLambertMaterial({ color: 0x8a5a34 });
  const sailMat = new THREE.MeshLambertMaterial({ color: 0xf5efe0, side: THREE.DoubleSide });
  for (let i = 0; i < 4; i++) {
    const b = new THREE.Group();
    const hull = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.2, 6), hullMat);
    const sail = new THREE.Mesh(new THREE.ConeGeometry(2.4, 6, 4), sailMat);
    sail.scale.z = 0.15; sail.position.y = 4;
    hull.castShadow = sail.castShadow = true;
    b.add(hull, sail);
    const a = Math.random() * Math.PI * 2;
    b.userData = { vx: Math.sin(a) * 3, vz: Math.cos(a) * 3, phase: Math.random() * 6.28 };

function windowTexture(seed) {

const CHUNK = 240, CITY_R = 850;

function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makeChunk(cx, cz) {
  const rnd = mulberry32(cx * 73856093 ^ cz * 19349663);
  const perMat = [[], [], []];
  const count = 9 + Math.floor(rnd() * 6);
  for (let i = 0; i < count; i++) {
    const w = 14 + rnd() * 18, d = 14 + rnd() * 18;
    const h = 18 + Math.pow(rnd(), 2) * 95;
    const g = new THREE.BoxGeometry(w, h, d).toNonIndexed();
    const uv = g.getAttribute('uv');
    for (let k = 0; k < uv.count; k++) uv.setXY(k, uv.getX(k) * w / 16, uv.getY(k) * h / 24);
    g.translate(cx * CHUNK + (rnd() - .5) * (CHUNK - 40), h / 2, cz * CHUNK + (rnd() - .5) * (CHUNK - 40));
    perMat[Math.floor(rnd() * 3)].push(g);
  }
  const group = new THREE.Group();
  perMat.forEach((list, i) => {
    if (list.length) group.add(new THREE.Mesh(BufferGeometryUtils.mergeGeometries(list), towerMats[i]));
  });
  return group;
}
function updateCity(px, pz) {
  if (cur.city < 0.03) return;
  const ccx = Math.round(px / CHUNK), ccz = Math.round(pz / CHUNK);
  const r = Math.ceil(CITY_R / CHUNK);
  for (let dz = -r; dz <= r; dz++) for (let dx = -r; dx <= r; dx++) {
    const cx = ccx + dx, cz = ccz + dz, key = cx + '_' + cz;
    if (!cityChunks.has(key)) {
      const g = makeChunk(cx, cz);
      cityChunks.set(key, g);
      cityGroup.add(g);
    }
  }
  for (const [key, g] of cityChunks) {
    const [cx, cz] = key.split('_').map(Number);
    if (Math.hypot(cx * CHUNK - px, cz * CHUNK - pz) > CITY_R + CHUNK * 2) {
      cityGroup.remove(g);
      g.traverse(o => o.geometry && o.geometry.dispose());
      cityChunks.delete(key);
    }
  }
}

function makeTrail(color, N = 60) {
  const geo = new THREE.BufferGeometry();
  const posArr = new Float32Array(N * 2 * 3);
  const colArr = new Float32Array(N * 2 * 4);
  for (let i = 0; i < N; i++) {
    const a = Math.pow(1 - i / (N - 1), 1.6) * 0.22;   // fades toward the tail
    colArr.set([1, 1, 1, a], (i * 2) * 4);
    colArr.set([1, 1, 1, a], (i * 2 + 1) * 4);
  }
  const idx = [];
  for (let i = 0; i < N - 1; i++) {
    const a = i * 2;
    idx.push(a, a + 1, a + 2, a + 1, a + 3, a + 2);
  }
  geo.setIndex(idx);
  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colArr, 4));
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, vertexColors: true,
    transparent: true, depthWrite: false, side: THREE.DoubleSide }));

    // --- slow ambient pad: drifting chords through a breathing lowpass ---
    const padLP = AC.createBiquadFilter();
    padLP.type = 'lowpass'; padLP.frequency.value = 720; padLP.Q.value = 0.4;
    const padGain = AC.createGain(); padGain.gain.value = 0.14;
    padLP.connect(padGain); padGain.connect(master);
    const padLfo = AC.createOscillator(), padLfoG = AC.createGain();
    padLfo.frequency.value = 0.05; padLfoG.gain.value = 190;
    padLfo.connect(padLfoG); padLfoG.connect(padLP.frequency);
    padLfo.start();

    const CHORDS = [                       // midi notes — a gentle circular progression
      [48, 55, 60, 64],                    // Cmaj
      [45, 52, 60, 64],                    // Am7-ish
      [41, 48, 57, 65],                    // Fmaj
      [43, 50, 59, 62]                     // G-ish
    ];
    const mtof = m => 440 * Math.pow(2, (m - 69) / 12);
    let ci = 0;
    const HOLD = 12, FADE = 5;
    function playChord() {
      if (!AC) return;
      const notes = CHORDS[ci % CHORDS.length]; ci++;
      const now = AC.currentTime;
      notes.forEach((m, i) => {
        [['sine', -4], ['triangle', 7]].forEach(([type, det]) => {
          const o = AC.createOscillator();
          o.type = type; o.frequency.value = mtof(m); o.detune.value = det;
          const g = AC.createGain();
          g.gain.setValueAtTime(0.0001, now);
          g.gain.linearRampToValueAtTime(0.045, now + FADE);
          g.gain.setValueAtTime(0.045, now + HOLD - FADE);
          g.gain.linearRampToValueAtTime(0.0001, now + HOLD);
          const p = makePan(i % 2 ? 0.35 : -0.35);
          o.connect(g); g.connect(p); p.connect(padLP);
          o.start(now); o.stop(now + HOLD + 0.1);
        });
      });
      setTimeout(playChord, (HOLD - FADE) * 1000);   // next chord fades in as this fades out
    }
    playChord();

    // --- occasional soft pentatonic chimes ---
    const PENTA = [72, 76, 79, 81, 84, 88];
    function chime() {
      if (!AC) return;
      const now = AC.currentTime;
      const o = AC.createOscillator();
      o.type = 'sine';
      o.frequency.value = mtof(PENTA[Math.floor(Math.random() * PENTA.length)]);
      const g = AC.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.linearRampToValueAtTime(0.055, now + 0.15);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);
      const p = makePan((Math.random() - .5) * 1.2);
      o.connect(g); g.connect(p); p.connect(master);
      g.connect(chimeSend);
      o.start(now); o.stop(now + 3.8);
      setTimeout(chime, 4500 + Math.random() * 8000);
    }
    setTimeout(chime, 6000);
  } catch (e) { /* no audio, no problem */ }
}

  soundBtn.textContent = soundOn ? '🔊' : '🔇';
}

// ---------------- Multiplayer — shared sky over a link (MQTT relay over WSS) ----------------
// Everyone in a room publishes tiny state packets to a public MQTT broker over
// secure WebSockets and subscribes to the whole room. Plain WSS gets through
// phone networks and CGNAT where WebRTC (no TURN) never connects.
const MAX_PLAYERS = 8;
const BROKERS = [
  'wss://broker.emqx.io:8084/mqtt',
  'wss://broker.hivemq.com:8884/mqtt',
  'wss://test.mosquitto.org:8081'
];
let client = null, roomCode = null, joined = false, netTimer = 0, spawnNearOthers = false;
const myId = Math.random().toString(36).slice(2, 10);
const players = new Map();   // playerId -> { plane, target, name, phase, lastSeen, trailL, trailR }
const CODE_CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
const roomTopic = () => 'skydrift-mk1/' + roomCode;
const hashId = id => [...String(id)].reduce((a, ch) => a * 31 + ch.charCodeAt(0) >>> 0, 7);
const colorOf = id => PLANE_COLS[hashId(id) % PLANE_COLS.length];

function makeLabel(text) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 30px system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,.65)'; ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(255,255,255,.95)';
  ctx.fillText(String(text).slice(0, 16), 128, 42);
  const mat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c),
    transparent: true, depthWrite: false, fog: false });
  const s = new THREE.Sprite(mat);
  s.scale.set(13, 3.25, 1);
  s.position.y = 3.2;
  return s;
}

function addPlayer(id, name) {
  if (players.has(id) || players.size >= MAX_PLAYERS - 1) return;
  const plane = buildPlane(colorOf(id));
  plane.rig.add(makeLabel(name || 'pilot'));
  scene.add(plane.rig);
  const p = {
    plane, name: name || 'pilot', phase: (hashId(id) % 628) / 100, lastSeen: performance.now(),
    target: { pos: state.pos.clone().add(new THREE.Vector3(12, 0, 0)), yaw: state.yaw, pitch: 0, roll: 0 },
    trailL: makeTrail(0xd9ecff, 44), trailR: makeTrail(0xd9ecff, 44)
  };
  plane.rig.position.copy(p.target.pos);
  players.set(id, p);
}
function removePlayer(id) {
  const p = players.get(id);
  if (!p) return;
  scene.remove(p.plane.rig);
  scene.remove(p.trailL.mesh); scene.remove(p.trailR.mesh);
  players.delete(id);
}

function applyRemoteState(id, d) {
  const p = players.get(id);
  if (!p) return;
  p.lastSeen = performance.now();
  p.target.pos.set(d.p[0], d.p[1], d.p[2]);
  p.target.yaw = d.yw; p.target.pitch = d.pt; p.target.roll = d.rl;
}

function netSendScene(i) {
  if (client && joined) {
    // retained, so pilots who join later land in the same sky
    client.publish(roomTopic() + '/scene', JSON.stringify({ i, by: myId }), { retain: true });
  }
}
function netPublishState() {
  if (!client || !joined) return;
  client.publish(roomTopic() + '/p/' + myId, JSON.stringify({
    n: myName(),
    p: [+state.pos.x.toFixed(2), +state.pos.y.toFixed(2), +state.pos.z.toFixed(2)],
    yw: +state.yaw.toFixed(3), pt: +state.pitch.toFixed(3), rl: +state.roll.toFixed(3)
  }));
}

function onNetMessage(topic, payload) {
  let d;
  try { d = JSON.parse(payload.toString()); } catch (e) { return; }
  const sub = topic.slice(roomTopic().length + 1);
  if (sub === 'scene') {
    if (d.by !== myId && SCENES[d.i]) setScene(d.i, true);
    return;
  }
  if (!sub.startsWith('p/')) return;
  const id = sub.slice(2);
  if (id === myId) return;
  if (d.bye) {
    const p = players.get(id);
    if (p) { showToast(`${p.name} flew away 👋`); removePlayer(id); }
    return;
  }
  if (!Array.isArray(d.p)) return;
  const isNew = !players.has(id);
  if (isNew) {
    addPlayer(id, d.n);
    if (!players.has(id)) return;   // room already full
    showToast(`${d.n || 'A pilot'} joined ✈️`);
  }
  applyRemoteState(id, d);
  if (isNew) {
    const p = players.get(id);
    p.plane.rig.position.copy(p.target.pos);
    if (spawnNearOthers) {
      // joined an in-progress flight — appear beside the flock, not at the origin
      spawnNearOthers = false;
      state.pos.set(d.p[0] + 10 + Math.random() * 14, Math.max(30, d.p[1]), d.p[2] + (Math.random() - .5) * 16);
    }
  }
}

function roomLink() {
  return location.origin + location.pathname + '?room=' + roomCode;
}
function showHostLink() {
  mpStatus.innerHTML = '';
  const line = document.createElement('div');
  line.textContent = `Room ${roomCode} — anyone with this link joins your sky:`;
  const linkEl = document.createElement('a');
  linkEl.href = roomLink(); linkEl.textContent = roomLink();
  linkEl.onclick = e => e.preventDefault();
  const btns = document.createElement('div');
  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copy link';
  copyBtn.onclick = () => {
    (navigator.clipboard ? navigator.clipboard.writeText(roomLink()) : Promise.reject())
      .then(() => copyBtn.textContent = 'Copied ✓')
      .catch(() => { linkEl.focus(); copyBtn.textContent = roomLink(); });
  };
  btns.appendChild(copyBtn);
  if (navigator.share) {
    const shareBtn = document.createElement('button');
    shareBtn.textContent = 'Share…';
    shareBtn.onclick = () => navigator.share({ title: 'Sky Drift', text: 'Come fly with me ✈️', url: roomLink() }).catch(() => {});
    btns.appendChild(shareBtn);
  }
  mpStatus.append(line, linkEl, btns);
}

function connectRoom(code, asHost, attempt = 0) {
  if (attempt >= BROKERS.length) {
    mpStatus.textContent = 'Couldn\'t reach the sky servers — check your internet and try again.';
    client = null; roomCode = null;
    return;
  }
  roomCode = code;
  mpStatus.textContent = attempt === 0 ? 'Connecting to the sky…'
    : `Still connecting — trying another route (${attempt + 1}/${BROKERS.length})…`;
  const c = mqtt.connect(BROKERS[attempt], {
    clientId: 'skydrift_' + myId,
    clean: true, connectTimeout: 8000, keepalive: 30, reconnectPeriod: 3000,
    // broker tells everyone if this tab dies without saying goodbye
    will: { topic: 'skydrift-mk1/' + code + '/p/' + myId, payload: JSON.stringify({ bye: 1 }), qos: 0, retain: false }
  });
  client = c;
  let everConnected = false;
  const nextBroker = () => {
    if (everConnected || client !== c) return;
    c.end(true);
    client = null;
    connectRoom(code, asHost, attempt + 1);
  };
  const failTimer = setTimeout(nextBroker, 9000);
  c.on('error', nextBroker);
  c.on('connect', () => {
    clearTimeout(failTimer);
    everConnected = true;
    c.subscribe(roomTopic() + '/#', err => {
      if (err || joined) return;
      joined = true;
      myBodyMat.color.setHex(colorOf(myId));
      netPublishState();               // announce myself right away
      if (asHost) {
        showHostLink();
        document.getElementById('soloBtn').textContent = `Take off ✈️ (room ${roomCode})`;
      } else {
        mpStatus.textContent = '';
        showToast('✈️✈️ You joined the sky!');
        startFlight();
      }
    });
  });
  c.on('message', onNetMessage);
}

function hostFlight() {
  if (client) return;
  const code = Array.from({ length: 4 }, () => CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)]).join('');
  connectRoom(code, true);
}

function joinFlight(code) {
  if (client) return;
  if (!code || code.length < 4) { mpStatus.textContent = 'Type the 4-letter room code first'; return; }
  spawnNearOthers = true;
  connectRoom(code.toUpperCase(), false);
}

// tell the others right away when this tab closes (the broker's will covers crashes)
addEventListener('pagehide', () => {
  try { if (client && joined) client.publish(roomTopic() + '/p/' + myId, JSON.stringify({ bye: 1 })); }
  catch (e) { /* best effort */ }

// heartbeat via setInterval — keeps running when the tab is backgrounded (rAF doesn't)
setInterval(() => { if (joined) netPublishState(); }, 2000);
// stale sweep — long fuse so throttled background tabs aren't kicked
const STALE_MS = 70000;
setInterval(() => {
  const now = performance.now();
  for (const [id, p] of players) {
    if (now - p.lastSeen > STALE_MS) {
      removePlayer(id);
      showToast(`${p.name} flew away 👋`);
    }
  }
}, 5000);

document.getElementById('soloBtn').onclick = startFlight;
document.getElementById('hostBtn').onclick = hostFlight;
document.getElementById('joinBtn').onclick = () => joinFlight(joinInput.value.trim().toUpperCase());
joinInput.addEventListener('keydown', e => {

// ---------------- Flight + world update ----------------
const FWD = new THREE.Vector3();
const camTarget = new THREE.Vector3();

function updateFlight(dt, t) {
  const left = keys['ArrowLeft'] || keys['KeyA'], right = keys['ArrowRight'] || keys['KeyD'];
  const up = keys['ArrowUp'] || keys['KeyW'], down = keys['ArrowDown'] || keys['KeyS'];
  let steer = (left ? 1 : 0) + (right ? -1 : 0) - touchInput.x;
  let climb = (up ? 1 : 0) + (down ? -1 : 0) - touchInput.y;
  steer = Math.max(-1, Math.min(1, steer));
  climb = Math.max(-1, Math.min(1, climb));
  const boost = keys['ShiftLeft'] || keys['ShiftRight'] || touchInput.boost;

  const targetRoll = steer * 0.55;
  const targetPitch = climb * 0.30;
  state.roll += (targetRoll - state.roll) * Math.min(1, dt * 2.5);
  state.pitch += (targetPitch - state.pitch) * Math.min(1, dt * 2.2);
  state.yaw += state.roll * dt * 0.85;

  const speed = boost ? 55 : 26;
  FWD.set(0, 0, -1).applyEuler(new THREE.Euler(state.pitch, state.yaw, 0, 'YXZ'));
  state.pos.addScaledVector(FWD, speed * dt);

  // gentle altitude limits — the sky is a comfy place, hills included
  const floorY = Math.max(10, terrainH(state.pos.x, state.pos.z) + 8);
  if (state.pos.y < floorY) { state.pos.y = floorY; state.pitch = Math.max(state.pitch, 0); }
  if (state.pos.y > 400) { state.pos.y = 400; state.pitch = Math.min(state.pitch, 0); }

  rig.position.copy(state.pos);
  rig.rotation.set(state.pitch, state.yaw, state.roll);
  model.position.y = Math.sin(t * 1.6) * 0.25;
  prop.rotation.z += dt * 45;

  // chase camera
  const back = new THREE.Vector3(0, 4.5, 14).applyEuler(new THREE.Euler(state.pitch * 0.5, state.yaw, 0, 'YXZ'));
  camTarget.copy(state.pos).add(back);
  camera.position.lerp(camTarget, 1 - Math.exp(-dt * 3.2));
  const lookAt = state.pos.clone().addScaledVector(FWD, 12);
  camera.lookAt(lookAt);
  camera.rotateZ(-state.roll * 0.35);

  // speed rush — widen the view while boosting
  const targetFov = boost ? 74 : 65;
  if (Math.abs(camera.fov - targetFov) > 0.05) {
    camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 3);
    camera.updateProjectionMatrix();
  }
  return boost;
}

function recycleClouds() {
  for (const c of clouds) {
    const dx = c.position.x - state.pos.x, dz = c.position.z - state.pos.z;
    const dist = Math.hypot(dx, dz);
    if (dist > 700) {
      const a = state.yaw + (Math.random() - .5) * 1.6;
      const r = 350 + Math.random() * 350;
      c.position.set(
        state.pos.x - Math.sin(a) * r,
        20 + Math.random() * 190,
        state.pos.z - Math.cos(a) * r
      );
    }
  }
}

// smooth-lerp all scene params toward target
const tmpV = new THREE.Vector3();
function lerpScene(dt) {
  const k = 1 - Math.exp(-dt * 1.4);
  const lc = (c, hex) => c.lerp(new THREE.Color(hex), k);
  lc(cur.top, target.top); lc(cur.bottom, target.bottom); lc(cur.fog, target.fog);
  lc(cur.ground, target.ground); lc(cur.cloud, target.cloud); lc(cur.orbCol, target.orbCol);
  lc(cur.hemiCol, target.hemiCol); lc(cur.dirCol, target.dirCol);
  cur.fogNear += (target.fogNear - cur.fogNear) * k;
  cur.fogFar += (target.fogFar - cur.fogFar) * k;
  cur.cloudOp += (target.cloudOp - cur.cloudOp) * k;
  cur.stars += (target.stars - cur.stars) * k;
  cur.orb += (target.orb - cur.orb) * k;
  cur.orbScale += (target.orbScale - cur.orbScale) * k;
  cur.hemi += (target.hemi - cur.hemi) * k;
  cur.dir += (target.dir - cur.dir) * k;
  cur.city += ((target.city || 0) - cur.city) * k;
  cur.ocean += ((target.ocean || 0) - cur.ocean) * k;
  cur.orbPos.lerp(tmpV.set(...target.orbPos), k);

  skyMat.uniforms.topColor.value.copy(cur.top);
  skyMat.uniforms.bottomColor.value.copy(cur.bottom);
  skyMat.uniforms.sunColor.value.copy(cur.orbCol);
  skyMat.uniforms.sunDir.value.copy(cur.orbPos).normalize();
  skyMat.uniforms.sunAmt.value = cur.orb;
  scene.fog.color.copy(cur.fog);
  scene.fog.near = cur.fogNear; scene.fog.far = cur.fogFar;
  groundMat.color.copy(cur.ground);
  cloudMat.color.copy(cur.cloud); cloudMat.opacity = cur.cloudOp;
  orbMat.color.copy(cur.orbCol); orbMat.opacity = cur.orb;
  glowMat.color.copy(cur.orbCol); glowMat.opacity = cur.orb * .8;
  orb.scale.setScalar(cur.orbScale);
  glow.scale.set(340 * cur.orbScale, 340 * cur.orbScale, 1);
  hemiLight.color.copy(cur.hemiCol); hemiLight.intensity = cur.hemi;
  dirLight.color.copy(cur.dirCol); dirLight.intensity = cur.dir;
}
cur.city = target.city;
cur.ocean = target.ocean || 0;

// ---------------- Main loop ----------------
const clock = new THREE.Clock();
let statTick = 0;

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  let boosting = false;
  if (flying) boosting = updateFlight(dt, t);
  else { // idle drift behind the title screen
    state.pos.z -= 8 * dt;
    rig.position.copy(state.pos);
    camera.position.set(state.pos.x + 10, state.pos.y + 4, state.pos.z + 16);
    camera.lookAt(state.pos);
    prop.rotation.z += dt * 30;
  }

  // ----- multiplayer sync -----
  netTimer += dt;
  if (netTimer > 0.1 && joined) {
    netTimer = 0;
    netPublishState();
  }
  for (const p of players.values()) {
    const k = 1 - Math.exp(-dt * 8);
    const r = p.plane.rig;
    r.position.lerp(p.target.pos, k);
    r.rotation.x += (p.target.pitch - r.rotation.x) * k;
    r.rotation.y += (p.target.yaw - r.rotation.y) * k;
    r.rotation.z += (p.target.roll - r.rotation.z) * k;
    p.plane.model.position.y = Math.sin(t * 1.6 + p.phase) * 0.25;
    p.plane.prop.rotation.z += dt * 45;
  }
  trailAcc += dt;
  if (trailAcc >= 0.045) {
    trailAcc = 0;
    if (flying) {
      rig.updateMatrixWorld(true);
      planeTrails(model, trailL, trailR);
    }
    for (const p of players.values()) {
      p.plane.rig.updateMatrixWorld(true);
      planeTrails(p.plane.model, p.trailL, p.trailR);
    }
  }

  for (const c of clouds) c.position.x += c.userData.drift * dt;
  recycleClouds();
  for (const b of balloons) {
    b.position.x += b.userData.drift * dt;
    b.position.y += Math.sin(t * 0.5 + b.userData.phase) * dt * 1.2;
    if (Math.hypot(b.position.x - state.pos.x, b.position.z - state.pos.z) > 850) {
      const a = state.yaw + (Math.random() - .5) * 1.4;
      const r = 400 + Math.random() * 380;
      b.position.set(state.pos.x - Math.sin(a) * r, 45 + Math.random() * 140, state.pos.z - Math.cos(a) * r);
    }
  }
  updateBirds(dt, t, state.pos.x, state.pos.z);
  updateCity(state.pos.x, state.pos.z);
  lerpScene(dt);

  // roads + traffic (city scene)
  roads.visible = cur.city > 0.03;
  carsGroup.visible = cur.city > 0.05;
  if (roads.visible) {
    roadMat.opacity = cur.city * 0.95;
    roads.position.set(Math.round(state.pos.x / CHUNK) * CHUNK, 0.25, Math.round(state.pos.z / CHUNK) * CHUNK);
  }
  if (carsGroup.visible) for (const car of cars) {
    const u = car.userData;
    car.position[u.axis] += u.dir * u.speed * dt;
    if (Math.hypot(car.position.x - state.pos.x, car.position.z - state.pos.z) > 620) {
      resetCar(car, state.pos.x, state.pos.z);
    }
  }

  // ocean: waves, islands, drifting boats
  updateWater(state.pos.x, state.pos.z, t);
  oceanGroup.visible = cur.ocean > 0.05;
  if (oceanGroup.visible) {
    for (const isl of islands) {
      if (Math.hypot(isl.position.x - state.pos.x, isl.position.z - state.pos.z) > 1150) {
        const a = state.yaw + (Math.random() - .5) * 1.6;
        const r = 500 + Math.random() * 500;
        isl.position.set(state.pos.x - Math.sin(a) * r, 0, state.pos.z - Math.cos(a) * r);
      }
    }
    for (const b of boats) {
      b.position.x += b.userData.vx * dt;
      b.position.z += b.userData.vz * dt;
      b.position.y = 3 + waveH(b.position.x, b.position.z, t) * 0.85;
      b.rotation.z = Math.sin(t * 1.1 + b.userData.phase) * 0.07;
      b.rotation.y = Math.atan2(b.userData.vx, b.userData.vz) + Math.PI;
      if (Math.hypot(b.position.x - state.pos.x, b.position.z - state.pos.z) > 900) {
        const a = state.yaw + (Math.random() - .5) * 1.6;
        const r = 350 + Math.random() * 400;
        b.position.set(state.pos.x - Math.sin(a) * r, 3, state.pos.z - Math.cos(a) * r);
      }
    }
  }

  // sun/moon shadow rig follows the plane
  dirLight.position.set(state.pos.x + 150, state.pos.y + 300, state.pos.z - 200);
  dirLight.target.position.copy(state.pos);

  // shooting stars, only under starry skies
  if (shootLife > 0) {
    shootLife -= dt;
    shootPos.addScaledVector(shootVel, dt);
    const p = shootGeo.attributes.position;
    p.setXYZ(0, shootPos.x, shootPos.y, shootPos.z);
    p.setXYZ(1, shootPos.x - shootVel.x * 0.14, shootPos.y - shootVel.y * 0.14, shootPos.z - shootVel.z * 0.14);
    p.needsUpdate = true;
    shootMat.opacity = Math.sin(Math.min(1, 1 - shootLife / 1.1) * Math.PI) * cur.stars;
    if (shootLife <= 0) { shootMat.opacity = 0; shootWait = 4 + Math.random() * 8; }
  } else if (cur.stars > 0.4) {
    shootWait -= dt;
    if (shootWait <= 0) {
      shootLife = 1.1;
      const a = Math.random() * Math.PI * 2;
      shootPos.set(state.pos.x + Math.sin(a) * 500, 320 + Math.random() * 200, state.pos.z + Math.cos(a) * 500);
      shootVel.set((Math.random() - .5) * 300, -140 - Math.random() * 80, (Math.random() - .5) * 300);
    }
  }
  starsA.mat.opacity = cur.stars * (0.88 + 0.12 * Math.sin(t * 2.7));
  starsB.mat.opacity = cur.stars * (0.7 + 0.3 * Math.sin(t * 1.9 + 2.1));

  // world anchors follow the plane
  sky.position.copy(state.pos);
  starsA.pts.position.copy(state.pos);
  starsB.pts.position.copy(state.pos);
  orbGroup.position.copy(state.pos).add(cur.orbPos);
  updateGround(state.pos.x, state.pos.z);

  statTick += dt;
  if (statTick > 0.25) {
    statTick = 0;
    let extra = '';
    if (players.size > 0) extra = `<br>👥 ${players.size + 1} flying together`;
    else if (joined && roomCode) extra = `<br>🔑 room ${roomCode} — share the link!`;
    statsEl.innerHTML = `⛰️ ${Math.round(state.pos.y)} m<br>✈️ ${boosting ? 55 : 26} m/s${extra}`;
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
